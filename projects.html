<script>
  function swapImage(mainId, src, thumbBtn) {
    const mainImg = document.getElementById(mainId);
    mainImg.style.opacity = '0';
    setTimeout(() => {
      mainImg.src = src;
      const isMain = src.includes('/main.');
      mainImg.classList.remove('object-cover', 'object-contain', 'object-bottom', 'object-top');
      if (isMain) {
        (mainImg.dataset.mainFit || 'object-cover').split(' ').forEach(c => mainImg.classList.add(c));
      } else {
        mainImg.classList.add('object-contain');
      }
      mainImg.style.opacity = '1';
    }, 200);
    const strip = thumbBtn.closest('.flex');
    strip.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
    thumbBtn.classList.add('active');
  }

  function toggleDetail(id, btn) {
    const el = document.getElementById(id);
    const label = btn.querySelector('.btn-label');
    const icon = btn.querySelector('.btn-icon');
    const isOpen = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
    if (isOpen) {
      el.style.maxHeight = '0';
      label.textContent = 'Read More';
      icon.textContent = 'add';
    } else {
      el.style.maxHeight = el.scrollHeight + 'px';
      label.textContent = 'Read Less';
      icon.textContent = 'remove';
    }
  }
</script>
